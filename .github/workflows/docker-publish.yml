# Land the Plane™ v1.0 — Workflow 11
# Build and push Docker image for the FastAPI backend to Docker Hub
# on push to main touching Python files.
name: Docker → Publish API image

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'agents/**'
      - 'harness/**'
      - 'packages/lightning/**'
      - 'packages/lightrag/**'
  workflow_dispatch:

jobs:
  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/akash-engine-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       apps/api/Dockerfile
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/akash-engine-api:buildcache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/akash-engine-api:buildcache,mode=max

      - name: Notify Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🐳 *Docker image published*
            Image: `${{ secrets.DOCKERHUB_USERNAME }}/akash-engine-api`
            Tags: ${{ steps.meta.outputs.tags }}
            Commit: `${{ github.sha }}`

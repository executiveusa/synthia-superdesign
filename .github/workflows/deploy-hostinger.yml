name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  deploy:
    name: Deploy Cynthia Studio OS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ secrets.VPS_HOST }}
            User ${{ secrets.VPS_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

      - name: Pull latest code on VPS
        run: |
          ssh vps "
            set -e
            if [ -d '${{ secrets.DEPLOY_DIR }}/.git' ]; then
              cd '${{ secrets.DEPLOY_DIR }}'
              git fetch origin main
              git reset --hard origin/main
            else
              git clone --branch main https://github.com/${{ github.repository }}.git '${{ secrets.DEPLOY_DIR }}'
            fi
          "

      - name: Write environment file
        run: |
          ssh vps "cat > '${{ secrets.DEPLOY_DIR }}/.env' << 'ENVEOF'
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          CYNTHIA_API_KEY=${{ secrets.CYNTHIA_API_KEY }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN_VPS }}
          ANTHROPIC_MODEL=${{ vars.ANTHROPIC_MODEL || 'claude-opus-4-7' }}
          DOMAIN=${{ secrets.DOMAIN }}
          SSL_EMAIL=${{ secrets.SSL_EMAIL }}
          ENVEOF"

      - name: Build and deploy containers
        run: |
          ssh vps "
            set -e
            cd '${{ secrets.DEPLOY_DIR }}'
            docker compose build --no-cache
            docker compose up -d --remove-orphans
            docker system prune -f
          "

      - name: Health check
        run: |
          sleep 20
          STATUS=$(curl -sf "https://${{ secrets.DOMAIN }}/api/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status','fail'))" 2>/dev/null || echo "fail")
          if [ "$STATUS" = "ok" ]; then
            echo "✅ Deployment successful — https://${{ secrets.DOMAIN }}"
          else
            echo "⚠️ Health check failed — check VPS logs"
            ssh vps "cd '${{ secrets.DEPLOY_DIR }}' && docker compose logs --tail=30"
            exit 1
          fi

      - name: Notify success
        if: success()
        run: |
          echo "🚀 Cynthia Studio OS deployed successfully"
          echo "Dashboard: https://${{ secrets.DOMAIN }}/dashboard"
          echo "API:       https://${{ secrets.DOMAIN }}/api/v1/"
          echo "MCP:       https://${{ secrets.DOMAIN }}/mcp/sse"

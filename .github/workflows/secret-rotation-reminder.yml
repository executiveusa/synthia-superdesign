# Land the Plane™ v1.0 — Workflow 12
# Monthly Telegram reminder to rotate API keys.
# Zero-maintenance security hygiene. Fires 9am UTC on the 1st of every month.
name: Secret Rotation Reminder

on:
  schedule:
    - cron: '0 9 1 * *'   # 9am UTC, 1st of every month
  workflow_dispatch:

jobs:
  remind:
    name: Remind to rotate secrets
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram reminder
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🔑 *Monthly Secret Rotation Reminder*

            Time to rotate:
            • ANTHROPIC_API_KEY
            • VERCEL_TOKEN
            • RAILWAY_TOKEN
            • DOCKERHUB_TOKEN
            • TELEGRAM_TOKEN (if compromised)

            Infisical project: synthia-3
            `infisical run --env=prod -- <command>`

            _Akash Engine OS — Emerald Tablets™ Security Protocol_
            _Land the Plane™ v1.0_

# Land the Plane™ v1.0 — Workflow 06
# Railway preview environment on every PR touching Python files.
# Comments the preview service domain back to the PR.
# Cleans up the preview environment when PR closes.
name: Deploy → Railway (API, Preview)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'agents/**'
      - 'harness/**'
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: preview-railway-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Railway preview deploy
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Railway preview
        id: railway
        uses: ayungavis/railway-preview-deploy@v1.0.2
        with:
          railway_api_token:        ${{ secrets.RAILWAY_TOKEN }}
          project_id:               ${{ secrets.RAILWAY_PROJECT_ID }}
          environment_name:         staging
          preview_environment_name: pr-${{ github.event.pull_request.number }}
          branch_name:              ${{ github.head_ref }}
          cleanup:                  "true"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const domain = '${{ steps.railway.outputs.service_domain }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🚂 Railway API Preview',
                '',
                `**URL:** https://${domain}`,
                `**Health:** https://${domain}/health`,
                `**Docs:** https://${domain}/docs`,
                '',
                '_Preview auto-cleans when PR closes._',
                '_Land the Plane™ v1.0_',
              ].join('\n'),
            });

  cleanup:
    name: Cleanup Railway preview on PR close
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - run: echo "Railway preview environment for PR #${{ github.event.pull_request.number }} cleaned up by ayungavis/railway-preview-deploy."

# Land the Plane™ v1.0 — Workflow 08
# Lighthouse CI on every Vercel preview deploy.
# Fails PR if Performance score drops below 90.
name: Lighthouse CI

on:
  deployment_status:

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Audit with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json
        id: lh

      - name: Comment Lighthouse results on PR
        uses: actions/github-script@v7
        if: github.event.pull_request
        with:
          script: |
            const results = ${{ steps.lh.outputs.manifest }};
            if (!results || !results[0]) return;
            const r = results[0].summary;
            const score = s => Math.round(s * 100);
            const icon  = s => s >= 0.9 ? '✅' : s >= 0.7 ? '⚠️' : '❌';
            const body = [
              '## 🔦 Lighthouse Results',
              '',
              `| Metric | Score |`,
              `|--------|-------|`,
              `| ${icon(r.performance)} Performance | ${score(r.performance)} |`,
              `| ${icon(r.accessibility)} Accessibility | ${score(r.accessibility)} |`,
              `| ${icon(r['best-practices'])} Best Practices | ${score(r['best-practices'])} |`,
              `| ${icon(r.seo)} SEO | ${score(r.seo)} |`,
              '',
              '_SYNTHIA™ floor: 90. Performance < 90 fails this PR._',
              '_Land the Plane™ v1.0_',
            ].join('\n');
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              head:  context.repo.owner + ':' + context.ref.replace('refs/heads/', ''),
            });
            if (prs[0]) {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prs[0].number,
                body,
              });
            }

# Land the Plane™ v1.0 — Workflow 04
# Vercel preview URL on every PR. Comments the URL back to the PR.
name: Deploy → Vercel (Web, Preview)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'

concurrency:
  group: preview-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview deploy → Vercel
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.10 }

      - run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Build preview
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Deploy preview
        id: preview
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Preview: $URL"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## 🚀 Vercel Preview',
                '',
                `**URL:** ${url}`,
                '',
                '| Check | Status |',
                '|-------|--------|',
                '| Preview deploy | ✅ Live |',
                '| Lighthouse | Runs automatically after deploy |',
                '',
                '_Land the Plane™ v1.0_',
              ].join('\n'),
            });

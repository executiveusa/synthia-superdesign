# Land the Plane™ v1.0 — Workflow 03
# Deploy apps/web to Vercel production on push to main.
# Uses prebuilt pattern: source never leaves the runner.
name: Deploy → Vercel (Web, Production)

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
  workflow_dispatch:

concurrency:
  group: deploy-vercel-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy apps/web → Vercel production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with: { bun-version: 1.3.10 }

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Vercel CLI
        run: bun add --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Build (prebuilt — source stays local)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Deploy prebuilt to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed: $URL"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}

      - name: Notify Telegram — success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ *Akash Engine — Web deployed*
            URL: ${{ steps.deploy.outputs.url }}
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}

      - name: Notify Telegram — failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to:      ${{ secrets.TELEGRAM_CHAT_ID }}
          token:   ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            🔴 *Akash Engine — Web deploy FAILED*
            Branch: ${{ github.ref }}
            Commit: `${{ github.sha }}`
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

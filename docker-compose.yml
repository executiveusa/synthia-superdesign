version: '3.9'

# Cynthia Studio OS — Main Instance
# Includes: Next.js dashboard, FastAPI gateway, MCP server, nginx, certbot

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: cynthia-web
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-7}
      - HF_TOKEN=${HF_TOKEN:-}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - NODE_ENV=production
    volumes:
      - web_data:/app/data
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cynthia_net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: cynthia-api
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CYNTHIA_API_KEY=${CYNTHIA_API_KEY}
      - DASHBOARD_URL=http://web:3001
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-7}
    expose:
      - "8000"
    networks:
      - cynthia_net
    depends_on:
      web:
        condition: service_healthy

  mcp:
    build:
      context: ./apps/mcp
      dockerfile: Dockerfile
    container_name: cynthia-mcp
    restart: unless-stopped
    environment:
      - CYNTHIA_API_KEY=${CYNTHIA_API_KEY}
      - DASHBOARD_URL=http://web:3001
    expose:
      - "8080"
    networks:
      - cynthia_net
    depends_on:
      web:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: cynthia-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
      - api
      - mcp
    networks:
      - cynthia_net

  certbot:
    image: certbot/certbot:latest
    container_name: cynthia-certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    command: >
      certonly --webroot -w /var/www/certbot
      --email ${SSL_EMAIL}
      -d ${DOMAIN}
      --agree-tos --non-interactive
    profiles:
      - ssl

volumes:
  web_data:
  certbot_etc:
  certbot_www:

networks:
  cynthia_net:
    driver: bridge

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGC Testimonial Template</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    #stage {
      position: relative;
      overflow: hidden;
      background: #0a1108;
      font-family: 'Suisse BP', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 1080px;
      height: 1920px;
    }

    /* Background B-roll */
    #product-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }

    /* Background overlay (depth) */
    .bg-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 17, 8, 0.4);
      backdrop-filter: blur(2px);
      opacity: 0;
    }

    /* Testimonial video (portrait, centered) */
    #user-testimonial {
      position: absolute;
      width: 540px;
      height: 960px;
      left: 270px;
      top: 480px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
      opacity: 0;
    }

    /* Quote text */
    .quote-text {
      position: absolute;
      bottom: 200px;
      left: 60px;
      right: 60px;
      font-size: 48px;
      font-weight: 600;
      line-height: 1.3;
      color: #ffffff;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
      opacity: 0;
    }

    /* Star rating */
    .star-rating {
      position: absolute;
      bottom: 120px;
      left: 60px;
      font-size: 40px;
      letter-spacing: 8px;
      opacity: 0;
    }

    /* CTA Button */
    .cta-button {
      position: absolute;
      bottom: 300px;
      left: 50%;
      transform: translateX(-50%);
      padding: 20px 60px;
      background: #c4963c;
      color: #0a1108;
      border: none;
      border-radius: 16px;
      font-size: 28px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 20px 40px rgba(196, 150, 60, 0.3);
      opacity: 0;
      transition: box-shadow 0.3s;
    }

    .cta-button:hover {
      box-shadow: 0 30px 60px rgba(196, 150, 60, 0.5);
    }

    /* Product shot (exit) */
    #product-final {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
    }

    /* Social proof */
    .social-proof {
      position: absolute;
      top: 200px;
      left: 60px;
      font-size: 36px;
      font-weight: 600;
      color: #c4963c;
      opacity: 0;
    }

    .proof-subtext {
      position: absolute;
      top: 280px;
      left: 60px;
      font-size: 28px;
      color: #c4963c;
      opacity: 0;
    }

    /* Audio elements (invisible) */
    audio {
      display: none;
    }
  </style>
</head>
<body>
  <div id="stage"
    data-composition-id="ugc-testimonial-v1"
    data-width="1080"
    data-height="1920"
    data-frame-rate="30"
    data-duration="15">

    <!-- AUDIO TRACK -->
    <audio
      src="assets/audio/upbeat-bg-music.mp3"
      data-start="0"
      data-duration="15"
      data-track-index="-2"
      data-volume="0.5"
    ></audio>

    <audio
      src="assets/audio/voiceover-testimonial.mp3"
      data-start="0.5"
      data-duration="4"
      data-track-index="-1"
      data-volume="0.95"
    ></audio>

    <audio
      src="assets/audio/sfx-button-click.mp3"
      data-start="8"
      data-duration="0.5"
      data-volume="0.7"
    ></audio>

    <!-- VIDEO LAYERS -->
    <!-- Background B-roll (blurred, faded) -->
    <video
      id="product-video"
      src="assets/video/product-broll.mp4"
      data-start="0"
      data-duration="15"
      data-track-index="0"
    ></video>

    <!-- Background overlay for depth -->
    <div class="bg-overlay" data-start="0" data-duration="15"></div>

    <!-- User testimonial video (portrait) -->
    <video
      id="user-testimonial"
      src="assets/video/user-testimonial.mp4"
      data-start="2"
      data-duration="3"
      data-track-index="1"
    ></video>

    <!-- Social proof stats -->
    <div class="social-proof" data-start="0.5" data-duration="3.5">
      10,000+
    </div>
    <div class="proof-subtext" data-start="0.5" data-duration="3.5">
      Teams trust us
    </div>

    <!-- Quote/testimonial text -->
    <div class="quote-text" data-start="2" data-duration="3">
      "This product changed how we ship features. 3x faster."
    </div>

    <!-- Star rating -->
    <div class="star-rating" data-start="2.2" data-duration="2.8">
      ⭐⭐⭐⭐⭐
    </div>

    <!-- CTA Button -->
    <button class="cta-button" data-start="8" data-duration="4">
      Get Started Free
    </button>

    <!-- Final product shot (exit frame) -->
    <video
      id="product-final"
      src="assets/video/product-final.mp4"
      data-start="12"
      data-duration="3"
      data-track-index="1"
    ></video>
  </div>

  <script>
    // GSAP Timeline - All animations tied to absolute time
    const timeline = gsap.timeline();

    // [0-0.5s] Product B-roll fades in
    timeline.from('#product-video', {
      opacity: 0,
      duration: 0.5,
    }, '0');

    timeline.from('.bg-overlay', {
      opacity: 0,
      duration: 0.5,
    }, '0');

    // [0.5-4.5s] Social proof fades in with scale
    timeline.from('.social-proof', {
      opacity: 0,
      scale: 0.8,
      duration: 0.4,
    }, '0.5');

    timeline.from('.proof-subtext', {
      opacity: 0,
      y: 20,
      duration: 0.4,
    }, '0.6');

    // [2-5s] User testimonial appears with glow effect
    timeline.from('#user-testimonial', {
      opacity: 0,
      scale: 0.9,
      duration: 0.5,
      ease: 'power3.out',
    }, '2');

    timeline.from('#user-testimonial', {
      filter: 'drop-shadow(0 0 30px rgba(196, 150, 60, 0.5))',
      duration: 0.5,
    }, '2');

    // [2-5.2s] Quote text reveals word-by-word
    timeline.from('.quote-text', {
      opacity: 0,
      y: 30,
      duration: 0.6,
      ease: 'power2.out',
    }, '2');

    timeline.from('.star-rating', {
      opacity: 0,
      duration: 0.3,
    }, '2.2');

    // [8-12s] CTA button pulses and glows
    timeline.from('.cta-button', {
      opacity: 0,
      scale: 0.8,
      duration: 0.4,
      ease: 'back.out(1.2)',
    }, '8');

    timeline.to('.cta-button', {
      boxShadow: '0 30px 60px rgba(196, 150, 60, 0.6)',
      duration: 0.5,
      repeat: 2,
      yoyo: true,
    }, '8.4');

    // [12-15s] Final product shot fades in, others fade out
    timeline.to(['#user-testimonial', '.quote-text', '.star-rating', '.cta-button'], {
      opacity: 0,
      duration: 0.5,
    }, '12');

    timeline.from('#product-final', {
      opacity: 0,
      duration: 0.5,
    }, '12');

    // [14-15s] Fade to black
    timeline.to('#stage', {
      backgroundColor: '#000000',
      duration: 1,
    }, '14');

    // Enable reduced motion support
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      gsap.globalTimeline.timeScale(0.3);
    }
  </script>
</body>
</html>
